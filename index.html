<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IoT Admin 审计日志原型</title>
  <style>
    :root {
      --blue: #4372ff;
      --blue-dark: #2b6bd9;
      --blue-weak: #ecf5ff;
      --blue-line: #e0ecff;
      --green: #67c23a;
      --green-weak: #f0f9eb;
      --orange: #e6a23c;
      --orange-weak: #fff7e6;
      --red: #f56c6c;
      --red-weak: #fef0f0;
      --nav: #001529;
      --nav-2: #000f1e;
      --bg: #f9f9f9;
      --panel: #ffffff;
      --line: #ebeef5;
      --line-light: #e4e7ed;
      --line-strong: #dcdfe6;
      --text-primary: #303133;
      --text: #606266;
      --muted: #909399;
      --placeholder: #a8abb2;
      --shadow: 0 0 12px rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, Inter, sans-serif;
      font-size: 16px;
      line-height: 24px;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button,
    select {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .app {
      display: grid;
      grid-template-columns: 208px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      background: var(--nav);
      color: #d5deea;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .brand {
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      white-space: nowrap;
    }

    .brand-logo {
      width: 150px;
      height: auto;
      display: block;
    }

    .menu {
      padding: 12px 8px 18px;
      overflow: auto;
    }

    .menu-block {
      margin-bottom: 14px;
    }

    .menu-title,
    .menu-item {
      min-height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 4px;
      padding: 0 16px;
      color: #aebbc9;
      white-space: nowrap;
      font-size: 14px;
    }

    .menu-title::before,
    .menu-item::before {
      content: "";
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
      border: 2px solid currentColor;
      border-radius: 4px;
      opacity: 0.9;
    }

    .menu-block:nth-child(1) .menu-title::before {
      border-radius: 50%;
    }

    .menu-title {
      color: #edf4ff;
      font-weight: 500;
    }

    .menu-item {
      margin-left: 36px;
      min-height: 50px;
      color: #aeb7c4;
      border: 0;
      width: calc(100% - 36px);
      background: transparent;
      text-align: left;
    }

    .menu-item.active {
      margin: 8px 0;
      width: 100%;
      min-height: 50px;
      color: #fff;
      background: var(--blue);
      font-weight: 600;
    }

    .menu-dark {
      margin: 10px -4px;
      padding: 8px 4px 10px;
      background: var(--nav-2);
    }

    .main {
      min-width: 0;
      height: 100vh;
      overflow: auto;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 54px;
      flex: 0 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      background: #fff;
      box-shadow: rgba(0, 0, 0, 0.06) 0 -1px 0 0 inset;
    }

    .title-stack {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .title-stack strong {
      font-size: 16px;
      line-height: 24px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .crumbs {
      color: var(--muted);
      font-size: 12px;
      line-height: 22px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .top-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--blue);
      background: var(--blue-weak);
      border: 1px solid var(--blue-line);
      font-size: 12px;
      font-weight: 700;
    }

    .content {
      padding: 24px;
      min-width: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line-light);
      border-radius: 4px;
    }

    .filter-panel {
      padding: 16px 16px 4px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(156px, 200px));
      gap: 12px 16px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .field label {
      color: var(--text);
      font-size: 14px;
      line-height: 21px;
      font-weight: 400;
    }

    input,
    select {
      width: 100%;
      height: 32px;
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      padding: 0 11px;
      color: var(--text);
      background: #fff;
      outline: none;
      font-size: 14px;
      line-height: 32px;
    }

    input::placeholder {
      color: var(--placeholder);
    }

    input:focus,
    select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px var(--blue-weak);
    }

    .filter-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      height: 32px;
    }

    .button {
      height: 32px;
      padding: 0 15px;
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      color: var(--text);
      background: #fff;
      font-size: 14px;
      line-height: 30px;
      font-weight: 500;
      white-space: nowrap;
    }

    .button.primary {
      border-color: var(--blue);
      color: #fff;
      background: var(--blue);
    }

    .button.primary:hover {
      background: var(--blue-dark);
    }

    .button.text {
      height: auto;
      padding: 0;
      border: 0;
      color: var(--blue);
      background: transparent;
      line-height: 22px;
      font-weight: 400;
    }

    .button.danger-text {
      height: auto;
      padding: 0;
      border: 0;
      color: var(--red);
      background: transparent;
      line-height: 22px;
      font-weight: 400;
    }

    .meta-row {
      min-height: 52px;
      padding: 10px 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      line-height: 20px;
    }

    .table-panel {
      margin-top: 16px;
      overflow: hidden;
    }

    .table-toolbar {
      min-height: 52px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
    }

    .table-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .table-title strong {
      color: var(--text-primary);
      font-size: 16px;
      line-height: 24px;
      font-weight: 500;
    }

    .table-title span {
      color: var(--muted);
      font-size: 13px;
      line-height: 20px;
    }

    .table-scroll {
      overflow: auto;
    }

    table {
      width: 100%;
      min-width: 1280px;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 14px;
    }

    th,
    td {
      min-height: 48px;
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      color: var(--text);
      text-align: left;
      vertical-align: middle;
      background: #fff;
    }

    th {
      color: var(--muted);
      background: #fafafa;
      font-weight: 600;
      white-space: nowrap;
    }

    td {
      line-height: 21px;
    }

    .sticky-op {
      position: sticky;
      right: 0;
      z-index: 2;
      box-shadow: -1px 0 0 var(--line);
    }

    th.sticky-op {
      z-index: 3;
      background: #fafafa;
    }

    .nowrap {
      white-space: nowrap;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 20px;
      color: var(--text);
    }

    .muted {
      color: var(--muted);
    }

    .resource-stack {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .resource-stack strong {
      color: var(--text-primary);
      font-size: 14px;
      line-height: 21px;
      font-weight: 500;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 24px;
      padding: 0 8px;
      border-radius: 4px;
      border: 1px solid var(--line-strong);
      color: var(--muted);
      background: #f4f4f5;
      font-size: 12px;
      line-height: 12px;
      white-space: nowrap;
    }

    .tag.success {
      color: var(--green);
      background: var(--green-weak);
      border-color: #e1f3d8;
    }

    .tag.warning {
      color: var(--orange);
      background: var(--orange-weak);
      border-color: #faecd8;
    }

    .tag.danger {
      color: var(--red);
      background: var(--red-weak);
      border-color: #fde2e2;
    }

    .tag.primary {
      color: var(--blue);
      background: var(--blue-weak);
      border-color: var(--blue-line);
    }

    .tag.dark {
      color: #fff;
      background: #4b5563;
      border-color: #4b5563;
    }

    .pagination {
      min-height: 64px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .page-btn {
      min-width: 32px;
      height: 32px;
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      color: var(--text);
      background: #fff;
    }

    .page-btn.active {
      color: #fff;
      border-color: var(--blue);
      background: var(--blue);
    }

    .empty {
      min-height: 260px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 14px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .drawer-mask {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(0, 0, 0, 0.28);
      display: none;
      justify-content: flex-end;
    }

    .drawer-mask.open {
      display: flex;
    }

    .drawer {
      width: min(720px, 100vw);
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .drawer-header {
      height: 56px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      flex: 0 0 auto;
    }

    .drawer-title {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .drawer-title strong {
      color: var(--text-primary);
      font-size: 16px;
      line-height: 24px;
      font-weight: 400;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drawer-title span {
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .close-btn {
      width: 32px;
      height: 32px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 22px;
      line-height: 32px;
    }

    .drawer-tabs {
      height: 40px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
      flex: 0 0 auto;
    }

    .tab-btn {
      height: 40px;
      border: 0;
      border-bottom: 2px solid transparent;
      color: var(--text);
      background: transparent;
      font-size: 14px;
      white-space: nowrap;
    }

    .tab-btn.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
      font-weight: 500;
    }

    .drawer-body {
      flex: 1 1 auto;
      overflow: auto;
      padding: 20px;
    }

    .drawer-footer {
      height: 64px;
      padding: 16px 20px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      border-top: 1px solid var(--line);
      flex: 0 0 auto;
    }

    .section {
      margin-bottom: 20px;
    }

    .section-title {
      margin: 0 0 12px;
      color: var(--text-primary);
      font-size: 15px;
      line-height: 22px;
      font-weight: 500;
    }

    .kv-grid {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      border-top: 1px solid var(--line);
      border-left: 1px solid var(--line);
    }

    .kv-label,
    .kv-value {
      min-height: 42px;
      padding: 10px 12px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      line-height: 21px;
      word-break: break-word;
    }

    .kv-label {
      color: var(--muted);
      background: #fafafa;
      font-weight: 500;
    }

    .kv-value {
      color: var(--text);
      background: #fff;
    }

    .diff-table,
    .mini-table {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-bottom: 0;
      font-size: 14px;
    }

    .diff-table th,
    .diff-table td,
    .mini-table th,
    .mini-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .diff-table th,
    .mini-table th {
      background: #fafafa;
    }

    .diff-table td.changed {
      color: var(--blue);
      background: var(--blue-weak);
    }

    .code-box {
      margin: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fafafa;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 20px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .file-list {
      display: grid;
      gap: 10px;
    }

    .file-row {
      min-height: 56px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
    }

    .file-meta {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .file-meta strong {
      color: var(--text-primary);
      font-size: 14px;
      line-height: 21px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-meta span {
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
    }

    .toast {
      position: fixed;
      right: 24px;
      top: 72px;
      z-index: 50;
      min-width: 240px;
      max-width: min(420px, calc(100vw - 48px));
      padding: 10px 14px;
      border-radius: 4px;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--line-light);
      box-shadow: var(--shadow);
      font-size: 14px;
      line-height: 21px;
      display: none;
    }

    .toast.show {
      display: block;
    }

    .toast.success {
      border-color: #e1f3d8;
      color: var(--green);
      background: var(--green-weak);
    }

    .toast.error {
      border-color: #fde2e2;
      color: var(--red);
      background: var(--red-weak);
    }

    @media (max-width: 1180px) {
      .filter-grid {
        grid-template-columns: repeat(3, minmax(156px, 1fr));
      }
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 64px minmax(0, 1fr);
      }

      .brand {
        padding: 0 12px;
      }

      .brand-logo {
        width: 40px;
        height: 40px;
        object-fit: cover;
        object-position: left center;
      }

      .menu-title span,
      .menu-item span {
        display: none;
      }

      .menu-title,
      .menu-item,
      .menu-item.active {
        width: 48px;
        margin-left: 0;
        padding: 0 12px;
        justify-content: center;
      }

      .content {
        padding: 16px;
      }

      .filter-grid {
        grid-template-columns: repeat(2, minmax(140px, 1fr));
      }

      .table-toolbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media (max-width: 640px) {
      .topbar {
        padding: 0 12px;
      }

      .top-actions {
        gap: 6px;
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .filter-actions {
        justify-content: flex-start;
      }

      .drawer {
        width: 100vw;
      }

      .kv-grid {
        grid-template-columns: 96px minmax(0, 1fr);
      }

      .file-row {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <img class="brand-logo" src="../../raw/2026-05-13-iot-admin-logo-BrgLp2AQ.svg" alt="LuteOS">
      </div>
      <nav class="menu" aria-label="IoT Admin">
        <div class="menu-block">
          <div class="menu-title"><span>概览</span></div>
          <button class="menu-item"><span>首页</span></button>
        </div>
        <div class="menu-block">
          <div class="menu-title"><span>智能产品</span></div>
          <button class="menu-item"><span>产品列表</span></button>
          <button class="menu-item"><span>产品配置</span></button>
        </div>
        <div class="menu-block">
          <div class="menu-title"><span>配置中心</span></div>
          <button class="menu-item"><span>白名单管理</span></button>
          <button class="menu-item"><span>数据导入</span></button>
        </div>
        <div class="menu-block menu-dark">
          <div class="menu-title"><span>系统管理</span></div>
          <button class="menu-item"><span>用户权限</span></button>
          <button class="menu-item active"><span>审计日志</span></button>
        </div>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="title-stack">
          <div class="crumbs">系统管理 / 审计日志</div>
          <strong>审计日志</strong>
        </div>
        <div class="top-actions" aria-label="顶部操作">
          <span class="top-dot">?</span>
          <span class="top-dot">铃</span>
          <span class="top-dot">审</span>
        </div>
      </header>

      <div class="content">
        <section class="panel filter-panel" aria-label="筛选条件">
          <div class="filter-grid">
            <div class="field">
              <label for="dateFrom">开始时间</label>
              <input id="dateFrom" type="datetime-local" value="2026-05-19T00:00">
            </div>
            <div class="field">
              <label for="dateTo">结束时间</label>
              <input id="dateTo" type="datetime-local" value="2026-05-19T23:59">
            </div>
            <div class="field">
              <label for="actorKeyword">操作主体 / uid / 姓名</label>
              <input id="actorKeyword" type="text" placeholder="system / UID / 姓名">
            </div>
            <div class="field">
              <label for="serialFilter">serial_code</label>
              <input id="serialFilter" type="text" placeholder="AUD-20260519">
            </div>
            <div class="field">
              <label for="actionFilter">操作类型</label>
              <select id="actionFilter">
                <option value="">全部</option>
                <option value="LOGIN">登录</option>
                <option value="LOGIN_FAIL">登录失败</option>
                <option value="LOGOUT">登出</option>
                <option value="INSERT">新增</option>
                <option value="UPDATE">修改</option>
                <option value="DELETE">删除</option>
                <option value="BATCH_UPDATE">批量修改</option>
                <option value="IMPORT">导入</option>
                <option value="EXPORT">导出</option>
                <option value="SYNC">系统同步</option>
                <option value="VIEW_DETAIL">详情查看</option>
                <option value="DOWNLOAD_ATTACHMENT">附件下载</option>
              </select>
            </div>
            <div class="field">
              <label for="categoryFilter">审计分类</label>
              <select id="categoryFilter">
                <option value="">全部</option>
                <option value="AUTH">AUTH</option>
                <option value="DML">DML</option>
                <option value="BATCH">BATCH</option>
                <option value="IMPORT">IMPORT</option>
                <option value="EXPORT">EXPORT</option>
                <option value="SYSTEM_SYNC">SYSTEM_SYNC</option>
                <option value="AUDIT_VIEW">AUDIT_VIEW</option>
                <option value="AUDIT_ATTACHMENT_DOWNLOAD">AUDIT_ATTACHMENT_DOWNLOAD</option>
              </select>
            </div>
            <div class="field">

    function parseTime(value) {
      return new Date(value.replace(" ", "T")).getTime();
    }

    function getFilterValues() {
      return {
        from: byId("dateFrom").value,
        to: byId("dateTo").value,
        actor: byId("actorKeyword").value.trim().toLowerCase(),
        serial: byId("serialFilter").value.trim().toLowerCase(),
        action: byId("actionFilter").value,
        category: byId("categoryFilter").value,
        module: byId("moduleFilter").value,
        resourceType: byId("resourceTypeFilter").value.trim().toLowerCase(),
        resourceId: byId("resourceIdFilter").value.trim().toLowerCase(),
        result: byId("resultFilter").value,
        traceId: byId("traceFilter").value.trim().toLowerCase(),
        uri: byId("uriFilter").value.trim().toLowerCase()
      };
    }

    function applyFilters() {
      const f = getFilterValues();
      const fromTs = f.from ? new Date(f.from).getTime() : Number.NEGATIVE_INFINITY;
      const toTs = f.to ? new Date(f.to).getTime() : Number.POSITIVE_INFINITY;

      filteredLogs = logs.filter((log) => {
        const ts = parseTime(log.time);
        const actorText = [log.actor, log.actorUid, log.actorName, log.account].join(" ").toLowerCase();
        return ts >= fromTs &&
          ts <= toTs &&
          (!f.actor || actorText.includes(f.actor)) &&
          (!f.serial || log.serial.toLowerCase().includes(f.serial)) &&
          (!f.action || log.action === f.action) &&
          (!f.category || log.category === f.category) &&
          (!f.module || log.module === f.module) &&
          (!f.resourceType || log.resourceType.toLowerCase().includes(f.resourceType)) &&
          (!f.resourceId || String(log.resourceId).toLowerCase().includes(f.resourceId)) &&
          (!f.result || log.result === f.result) &&
          (!f.traceId || log.traceId.toLowerCase().includes(f.traceId)) &&
          (!f.uri || log.requestUri.toLowerCase().includes(f.uri));
      });

      currentPage = 1;
      renderTable();
      showToast("查询完成", "success");
    }

    function resetFilters() {
      byId("dateFrom").value = "2026-05-19T00:00";

      filteredLogs = [...logs];
      currentPage = 1;
      renderTable();
      showToast("已重置筛选条件", "success");
    }

    function resultTag(result) {
      if (result === "SUCCESS") return "success";
      if (result === "FAIL") return "danger";
      return "warning";
    }

    function categoryTag(category) {
      if (category === "AUTH") return "primary";
      if (category === "SYSTEM_SYNC") return "dark";
      if (category === "IMPORT" || category === "EXPORT" || category === "BATCH") return "warning";
      if (category.includes("AUDIT")) return "primary";
      return "";
    }

    function actorLabel(log) {
      if (log.actorType === "SYSTEM") return '<span class="tag dark">system</span>';
      if (log.actorType === "UNKNOWN") return '<span class="tag">unknown</span>';
      return '<span class="tag primary">user</span>';
    }

      const tbody = byId("auditTbody");

      const table = byId("auditTable");
      const total = filteredLogs.length;
      const maxPage = Math.max(1, Math.ceil(total / pageSize));
      currentPage = Math.min(currentPage, maxPage);
      const start = (currentPage - 1) * pageSize;
      const pageRows = filteredLogs.slice(start, start + pageSize);

      tbody.innerHTML = pageRows.map((log) => `
        <tr>
          <td class="nowrap">${log.time}</td>
          <td class="mono nowrap">${log.serial}</td>
          <td>${actorLabel(log)}</td>
          <td>
            <div class="resource-stack">
              <strong>${log.actorUid}</strong>
              <span class="muted">${log.actorName || "-"}</span>
            </div>
          </td>
          <td><span class="tag ${categoryTag(log.category)}">${log.category}</span></td>
          <td class="nowrap">${labelMap[log.action] || log.action}</td>
          <td class="nowrap">${log.module}</td>
          <td>
            <div class="resource-stack">
              <strong>${log.resourceType} / ${log.resourceId}</strong>
              <span class="muted">${log.resourceName}</span>
            </div>
          </td>
          <td><span class="tag ${resultTag(log.result)}">${resultMap[log.result] || log.result}</span></td>
          <td class="nowrap">${log.ip}</td>
          <td class="mono nowrap">${log.traceId}</td>
          <td class="sticky-op"><button class="button text" type="button" data-serial="${log.serial}">查看</button></td>
        </tr>
      `).join("");

      table.hidden = total === 0;
      empty.hidden = total !== 0;
      byId("filteredCount").textContent = total;
      byId("tableSummary").textContent = `按操作时间倒序，当前第 ${currentPage} / ${maxPage} 页`;
      byId("pageInfo").textContent = `共 ${total} 条`;
      byId("pageOne").textContent = String(currentPage);
      byId("prevPage").disabled = currentPage === 1;
      byId("nextPage").disabled = currentPage === maxPage;

      tbody.querySelectorAll("[data-serial]").forEach((btn) => {
        btn.addEventListener("click", () => openDrawer(btn.dataset.serial));
      });
    }

    function openDrawer(serial) {
      selectedLog = logs.find((item) => item.serial === serial);
      if (!selectedLog) return;
      activeTab = "basic";
      renderDrawer();
      byId("drawerMask").classList.add("open");
      byId("drawerMask").setAttribute("aria-hidden", "false");
      appendEvidenceEvent("VIEW_DETAIL", selectedLog, "SUCCESS");
    }

    function closeDrawer() {
      byId("drawerMask").classList.remove("open");
      byId("drawerMask").setAttribute("aria-hidden", "true");
      selectedLog = null;
    }

    function renderTabs() {
      byId("drawerTabs").innerHTML = tabs.map((tab) => `
        <button class="tab-btn ${activeTab === tab.id ? "active" : ""}" type="button" data-tab="${tab.id}">${tab.label}</button>
      `).join("");
      byId("drawerTabs").querySelectorAll("[data-tab]").forEach((btn) => {
        btn.addEventListener("click", () => {
          activeTab = btn.dataset.tab;
          renderDrawer();
        });
      });
    }

    function renderDrawer() {
      if (!selectedLog) return;
      byId("drawerTitle").textContent = `${labelMap[selectedLog.action] || selectedLog.action} - ${selectedLog.resourceName}`;
      byId("drawerSubTitle").textContent = `${selectedLog.serial} / ${selectedLog.traceId}`;
      renderTabs();
      const content = {
        basic: renderBasic,
        actor: renderActor,
        context: renderContext,
        object: renderObject,
        changes: renderChanges,
        batch: renderBatch,
        files: renderFiles
      }[activeTab]();
      byId("drawerBody").innerHTML = content;
      byId("drawerBody").querySelectorAll("[data-download]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const fileId = btn.dataset.download;
          const file = (selectedLog.attachments || []).find((item) => item.id === fileId);
          downloadAttachment(file);
        });
      });
    }

    function kv(rows) {
      return `<div class="kv-grid">${rows.map(([label, value]) => `
        <div class="kv-label">${label}</div>
        <div class="kv-value">${value ?? "-"}</div>
      `).join("")}</div>`;
    }

    function renderBasic() {
      return `
        <section class="section">
          <h3 class="section-title">基本信息</h3>
          ${kv([
            ["审计流水号", selectedLog.serial],
            ["traceId", `<span class="mono">${selectedLog.traceId}</span>`],
            ["审计分类", `<span class="tag ${categoryTag(selectedLog.category)}">${selectedLog.category}</span>`],
            ["操作动作", labelMap[selectedLog.action] || selectedLog.action],
            ["操作时间", selectedLog.time],
            ["操作结果", `<span class="tag ${resultTag(selectedLog.result)}">${resultMap[selectedLog.result] || selectedLog.result}</span>`],
            ["错误码", selectedLog.errorCode || "-"],
            ["错误信息", selectedLog.errorMsg || "-"],
            ["耗时", `${selectedLog.duration || 0} ms`],
            ["摘要", selectedLog.summary]
          ])}
        </section>
      `;
    }

    function renderActor() {
      return `
        <section class="section">
          <h3 class="section-title">操作主体</h3>
          ${kv([
            ["主体类型", selectedLog.actorType],
            ["操作主体", selectedLog.actor],
            ["用户 uid", selectedLog.actorUid],
            ["姓名快照", selectedLog.actorName],
            ["账号标识", selectedLog.account],
            ["认证渠道", selectedLog.channel],
            ["来源系统", selectedLog.sourceSystem || "-"],
            ["同步任务 ID", selectedLog.syncTaskId || "-"],
            ["同步批次", selectedLog.syncBatch || "-"]
          ])}
        </section>
      `;
    }

    function renderContext() {
      return `
        <section class="section">
          <h3 class="section-title">请求上下文</h3>
          ${kv([
            ["HTTP 方法", selectedLog.method],
            ["请求 URI", `<span class="mono">${selectedLog.requestUri}</span>`],
            ["客户端 IP", selectedLog.ip],
            ["User-Agent", selectedLog.userAgent || "-"],
            ["请求摘要", `<pre class="code-box">${escapeHtml(JSON.stringify(selectedLog.requestSnapshot || {}, null, 2))}</pre>`],
            ["返回摘要", `<pre class="code-box">${escapeHtml(JSON.stringify(selectedLog.resultSnapshot || {}, null, 2))}</pre>`]
          ])}
        </section>
      `;
    }

    function renderObject() {
      return `
        <section class="section">
          <h3 class="section-title">操作对象</h3>
          ${kv([
            ["模块", selectedLog.module],
            ["资源类型", selectedLog.resourceType],
            ["资源 ID", selectedLog.resourceId],
            ["业务对象", selectedLog.resourceName],
            ["证据目标", selectedLog.evidenceTarget || "-"],
            ["批量范围", selectedLog.batch ? selectedLog.batch.scope : "-"]
          ])}
        </section>
      `;
    }

    function renderChanges() {
      const changes = selectedLog.changes || [];
      const details = selectedLog.details || [];
      const diff = changes.length ? `
        <table class="diff-table">
          <thead><tr><th>字段</th><th>变更前</th><th>变更后</th></tr></thead>
          <tbody>
            ${changes.map((item) => `
              <tr>
                <td>${item.label}</td>
                <td>${item.before ?? "-"}</td>
                <td class="${item.changed ? "changed" : ""}">${item.after ?? "-"}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      ` : `<div class="empty">当前日志无单体变更前后数据</div>`;

      const detailTable = details.length ? `
        <table class="mini-table">
          <thead><tr><th>表 / 资源</th><th>类型</th><th>业务键</th><th>变更前</th><th>变更后</th><th>行数</th></tr></thead>
          <tbody>
            ${details.map((item) => `
              <tr>
                <td>${item.table}</td>
                <td>${item.type}</td>
                <td>${item.key}</td>
                <td>${item.before}</td>
                <td>${item.after}</td>
                <td>${item.rows}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      ` : "";

      return `
        <section class="section">
          <h3 class="section-title">字段差异</h3>
          ${diff}
        </section>
        <section class="section">
          <h3 class="section-title">明细记录</h3>
          ${detailTable || `<div class="empty">当前日志无数据库变更明细</div>`}
        </section>
      `;
    }

    function renderBatch() {
      const batch = selectedLog.batch;
      const rows = selectedLog.rowResults || [];
      if (!batch && !selectedLog.importInfo && !selectedLog.exportInfo) {
        return `<div class="empty">当前日志无批量、导入或导出规模信息</div>`;
      }

      const batchBlock = batch ? `
        <section class="section">
          <h3 class="section-title">批量操作</h3>
          ${kv([
            ["对象范围", batch.scope],
            ["预期数量", batch.expected],
            ["成功数量", batch.success],
            ["失败数量", batch.failed],
            ["统一目标值", batch.target],
            ["失败摘要", batch.failure || "-"]
          ])}
        </section>
      ` : "";

      const importBlock = selectedLog.importInfo ? `
        <section class="section">
          <h3 class="section-title">导入规模</h3>
          ${kv([
            ["原始文件", selectedLog.importInfo.fileName],
            ["文件大小", selectedLog.importInfo.size],
            ["总行数", selectedLog.importInfo.totalRows],
            ["有效行数", selectedLog.importInfo.validRows],
            ["成功行数", selectedLog.importInfo.successRows],
            ["失败行数", selectedLog.importInfo.failedRows],
            ["跳过行数", selectedLog.importInfo.skippedRows]
          ])}
        </section>
      ` : "";

      const exportBlock = selectedLog.exportInfo ? `
        <section class="section">
          <h3 class="section-title">导出规模</h3>
          ${kv([
            ["导出条件", selectedLog.exportInfo.condition],
            ["导出行数", selectedLog.exportInfo.rows],
            ["字段范围", selectedLog.exportInfo.columns],
            ["文件名", selectedLog.exportInfo.fileName],
            ["文件大小", selectedLog.exportInfo.size],
            ["链接有效期", selectedLog.exportInfo.expireAt]
          ])}
        </section>
      ` : "";

      const rowTable = rows.length ? `
        <section class="section">
          <h3 class="section-title">逐行结果样例</h3>
          <table class="mini-table">
            <thead><tr><th>行号</th><th>业务键</th><th>结果</th><th>原因</th></tr></thead>
            <tbody>
              ${rows.map((item) => `
                <tr>
                  <td>${item.row}</td>
                  <td>${item.key}</td>
                  <td>${item.result}</td>
                  <td>${item.reason}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </section>
      ` : "";

      return batchBlock + importBlock + exportBlock + rowTable;
    }

    function renderFiles() {
      const files = selectedLog.attachments || [];
      if (!files.length) {
        return `<div class="empty">当前日志无导入 / 导出附件</div>`;
      }

      return `
        <section class="section">
          <h3 class="section-title">附件下载</h3>
          <div class="file-list">
            ${files.map((file) => `
              <div class="file-row">
                <div class="file-meta">
                  <strong>${file.name}</strong>
                  <span>${file.type} / ${file.size} / ${file.permission ? "有下载权限" : "无下载权限"}</span>
                </div>
                <button class="button ${file.permission ? "primary" : ""}" type="button" data-download="${file.id}">下载</button>
              </div>
            `).join("")}
          </div>
        </section>
      `;
    }

    function downloadAttachment(file) {
      if (!file) return;
      if (!file.permission) {
        appendEvidenceEvent("DOWNLOAD_ATTACHMENT", selectedLog, "FAIL", file);
        showToast("无附件下载权限", "error");
        return;
      }
      appendEvidenceEvent("DOWNLOAD_ATTACHMENT", selectedLog, "SUCCESS", file);
      showToast(`已生成下载记录：${file.name}`, "success");
      renderDrawer();
    }

    function appendEvidenceEvent(type, targetLog, result, file) {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      const time = `2026-05-19 ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      serialSeq += 1;
      const isDownload = type === "DOWNLOAD_ATTACHMENT";
      const serial = `AUD-ACCESS-${serialSeq}`;
      const newLog = {
        serial,
        time,
        category: isDownload ? "AUDIT_ATTACHMENT_DOWNLOAD" : "AUDIT_VIEW",
        action: type,
        module: "系统管理",
        resourceType: isDownload ? "AUDIT_ATTACHMENT" : "AUDIT_LOG",
        resourceId: targetLog.serial,
        resourceName: isDownload ? (file ? file.name : "审计附件") : "审计详情",
        actorType: "USER",
        actor: "user",
        actorUid: currentUser.uid,
        actorName: currentUser.name,
        account: currentUser.account,
        channel: "MAIN",
        ip: currentUser.ip,
        traceId: `trace-access-${serialSeq}`,
        requestUri: isDownload ? `/api/audit/attachments/${targetLog.serial}/${file ? file.id : "unknown"}` : `/api/audit/logs/${targetLog.serial}`,
        method: "GET",
        result,
        duration: result === "SUCCESS" ? 88 : 42,
        errorCode: result === "FAIL" ? "NO_ATTACHMENT_PERMISSION" : "",
        errorMsg: result === "FAIL" ? "无附件下载权限" : "",
        summary: isDownload ? "下载审计附件" : "查看审计详情",
        details: [],
        evidenceTarget: targetLog.serial,
        userAgent: "Chrome 124 / macOS",
        requestSnapshot: { targetSerial: targetLog.serial, attachment: file ? file.name : undefined },
        resultSnapshot: { success: result === "SUCCESS", fileName: file ? file.name : undefined }
      };
      logs.unshift(newLog);
      accessEventsAdded += 1;
      byId("accessCount").textContent = accessEventsAdded;
      filteredLogs = applyCurrentFiltersWithoutToast();
      renderTable();
    }

    function applyCurrentFiltersWithoutToast() {
      const f = getFilterValues();
      const fromTs = f.from ? new Date(f.from).getTime() : Number.NEGATIVE_INFINITY;
      const toTs = f.to ? new Date(f.to).getTime() : Number.POSITIVE_INFINITY;
      return logs.filter((log) => {
        const ts = parseTime(log.time);
        const actorText = [log.actor, log.actorUid, log.actorName, log.account].join(" ").toLowerCase();
        return ts >= fromTs &&
          ts <= toTs &&
          (!f.actor || actorText.includes(f.actor)) &&
          (!f.serial || log.serial.toLowerCase().includes(f.serial)) &&
          (!f.action || log.action === f.action) &&
          (!f.category || log.category === f.category) &&
          (!f.module || log.module === f.module) &&
          (!f.resourceType || log.resourceType.toLowerCase().includes(f.resourceType)) &&
          (!f.resourceId || String(log.resourceId).toLowerCase().includes(f.resourceId)) &&
          (!f.result || log.result === f.result) &&
          (!f.traceId || log.traceId.toLowerCase().includes(f.traceId)) &&
          (!f.uri || log.requestUri.toLowerCase().includes(f.uri));
      });
    }

    function showToast(message, type) {
      const toast = byId("toast");
      toast.textContent = message;
      toast.className = `toast show ${type || ""}`;
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        toast.className = "toast";
      }, 2200);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    byId("queryBtn").addEventListener("click", applyFilters);
    byId("resetBtn").addEventListener("click", resetFilters);
    byId("prevPage").addEventListener("click", () => {
      currentPage = Math.max(1, currentPage - 1);
      renderTable();
    });
    byId("nextPage").addEventListener("click", () => {
      const maxPage = Math.max(1, Math.ceil(filteredLogs.length / pageSize));
      currentPage = Math.min(maxPage, currentPage + 1);
      renderTable();
    });
    byId("closeDrawer").addEventListener("click", closeDrawer);
    byId("closeDrawerFooter").addEventListener("click", closeDrawer);
    byId("drawerMask").addEventListener("click", (event) => {
      if (event.target === byId("drawerMask")) closeDrawer();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeDrawer();
    });

    renderTable();
  </script>
</body>
</html>
